# ops-system 配置模板。
#
# 使用方式：
#   1) cp backend/configs/config.example.yaml backend/configs/config.yaml
#   2) 设置环境变量（推荐）或直接修改 yaml：
#      export OPS_JWT_SECRET='<32+ chars random>'
#      export OPS_DATABASE_PASSWORD='<real secret>'
#      export OPS_GRAFANA_API_KEY='glsa_xxx'
#      export OPS_N9E_TOKEN='xxx'
#      export OPS_VM_VMAUTH_WEBHOOK_URL='http://...'
#   3) 任何出现 ${VAR} 的地方都会在启动时由 os.ExpandEnv 展开。
#
# release 模式额外强校验：
#   - jwt.secret 必须 >= 32 字节且非 example 默认值；
#   - database.password 必须非空且非 example 默认值；
#   - database.sslmode 不能为 disable；
#   - cors.allowed_origins 必须非空。

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"            # release | debug | test

database:
  host: "${OPS_DATABASE_HOST}"
  port: 5432
  user: "${OPS_DATABASE_USER}"
  password: "${OPS_DATABASE_PASSWORD}"
  name: "ops_system"
  sslmode: "require"       # release 模式下不能是 disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime_minutes: 5

redis:
  host: "${OPS_REDIS_HOST}"
  port: 6379

kubernetes:
  incluster: false
  kubeconfig: "${OPS_KUBECONFIG}"

helm:
  repos:
    - name: vm
      url: https://victoriametrics.github.io/helm-charts/
    - name: grafana
      url: https://grafana.github.io/helm-charts/
  charts:
    shared: ""
    dedicated_single: ""
    dedicated_cluster: ""
    vl: ""
    grafana: ""
    n9e_edge: ""

orchestration:
  enabled: false
  namespace_prefix: "ops"
  apply_network_policy: false

jwt:
  secret: "${OPS_JWT_SECRET}"   # release: >=32 字节
  expire_hours: 24

ratelimit:
  requests_per_second: 100
  burst: 200

# release 模式必填；示例:
#   allowed_origins: ["https://ops.example.com"]
cors:
  allowed_origins: []

vm:
  vmauth_base_url: "${OPS_VM_VMAUTH_BASE_URL}"
  sync_enabled: false
  vmauth_webhook_url: "${OPS_VM_VMAUTH_WEBHOOK_URL}"
  http_timeout_seconds: 15

n9e:
  enabled: false
  base_url: "${OPS_N9E_BASE_URL}"
  username: ""
  password: "${OPS_N9E_PASSWORD}"
  token: "${OPS_N9E_TOKEN}"
  api_prefix: "/api/n9e"
  http_timeout_seconds: 20
  prometheus_datasource_url: "${OPS_N9E_PROMETHEUS_DS}"

grafana:
  enabled: true
  base_url: "${OPS_GRAFANA_BASE_URL}"
  api_key: "${OPS_GRAFANA_API_KEY}"
  http_timeout_seconds: 30
  prometheus_datasource_url: "${OPS_GRAFANA_PROMETHEUS_DS}"
  org_name_prefix: ""

notification:
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 465
    username: "${OPS_NOTIFICATION_EMAIL_USERNAME}"
    password: "${OPS_NOTIFICATION_EMAIL_PASSWORD}"
    from: ""

# worker 状态同步（§worker）。默认关闭，避免"伪 running"。
# 开启后，对处于 creating/updating 的实例做 60s 一次的状态推进。
worker:
  instance_status_auto_advance: false

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"

database:
  host: "postgresql"
  port: 5432
  user: "postgres"
  password: "${DB_PASSWORD}"
  name: "monitoring"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime_minutes: 5

redis:
  host: "redis"
  port: 6379

kubernetes:
  incluster: false
  kubeconfig: "/etc/kubernetes/admin.conf"

helm:
  repos:
    - name: vm
      url: https://victoriametrics.github.io/helm-charts/
    - name: grafana
      url: https://grafana.github.io/helm-charts/
  # 各模板主 chart（留空则仅创建命名空间/配额，不执行 helm install）
  charts:
    shared: ""
    dedicated_single: ""
    dedicated_cluster: ""
    vl: ""
    grafana: ""
    n9e_edge: ""

# 租户 K8s/Helm 编排（§2.6）；默认关闭
orchestration:
  enabled: false
  namespace_prefix: "ops"
  apply_network_policy: false

jwt:
  secret: "${JWT_SECRET}"
  expire_hours: 24

ratelimit:
  requests_per_second: 100
  burst: 200

# CORS 跨域策略：allowed_origins 为空列表时允许所有来源（开发模式）
# 生产环境示例: ["https://ops.example.com", "https://admin.example.com"]
cors:
  allowed_origins: []

# VictoriaMetrics vmauth（§2.3）：插入地址拼接；可选 Webhook 同步 vmuser
vm:
  vmauth_base_url: "http://vmauth.platform:8421"
  sync_enabled: false
  vmauth_webhook_url: ""
  http_timeout_seconds: 15

# 夜莺 N9E（§2.4）
n9e:
  enabled: false
  base_url: "http://n9e.platform:18000"
  username: "${N9E_USERNAME}"
  password: "${N9E_PASSWORD}"
  token: ""
  api_prefix: "/api/n9e"
  http_timeout_seconds: 20
  prometheus_datasource_url: ""

# Grafana（§2.5）
grafana:
  enabled: false
  base_url: "http://grafana.platform:3000"
  api_key: "${GRAFANA_API_KEY}"
  http_timeout_seconds: 30
  prometheus_datasource_url: ""
  org_name_prefix: ""

# 共享版：与平台共享 VictoriaMetrics，租户侧仅部署 VL + n9e-edge
tenant:
  mode: shared

victoriaLogs:
  enabled: true
  retention: 7d
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 5Gi
    storageClassName: ""

n9eEdge:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  config:
    heartbeat_interval: 15s
